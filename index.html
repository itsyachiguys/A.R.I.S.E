<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.I.S.E | Smart Warehouse Dashboard v2.1</title>

    <!-- LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #4ade80;
            /* Bright Green */
            --primary-dark: #22c55e;
            --success: #22c55e;
            --warning: #facc15;
            --danger: #f87171;
            --critical: #ef4444;
            --bg-body: #050a08;
            --bg-card: #0d1b14;
            --bg-panel: #14281d;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1d3326;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --sidebar-width: 260px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        [data-theme="light"] {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --critical: #b91c1c;
            --bg-body: #f0fdf4;
            --bg-card: #ffffff;
            --bg-panel: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2.5rem;
            padding-left: 0.5rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin: 1.5rem 0 0.5rem 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.3rem;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(74, 222, 128, 0.1);
            color: var(--primary);
        }

        .nav-item i {
            width: 18px;
            height: 18px;
        }

        /* MAIN CONTENT AREA */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* HEADER */
        header {
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-body);
            position: relative;
            z-index: 50;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex: 1;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .breadcrumb span.active {
            color: var(--primary);
        }

        /* Search Bar Fix */
        .search-container {
            position: relative;
            width: 400px;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: border-color 0.2s;
            overflow: hidden;
            padding: 0 1rem;
            height: 42px;
        }

        .search-container:focus-within {
            border-color: var(--primary);
        }

        .search-icon {
            color: var(--text-muted);
            width: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-main);
            outline: none;
            padding: 0 0.8rem;
            font-size: 0.85rem;
            height: 100%;
        }

        .search-filter-icon {
            color: var(--text-muted);
            width: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s;
        }

        .search-filter-icon:hover {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-btn {
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
            position: relative;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            height: 24px;
            width: 24px;
        }

        .icon-btn:hover {
            color: var(--text-main);
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--critical);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .profile-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-panel);
            color: var(--primary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
        }

        /* MAIN SCROLLABLE AREA */
        main {
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* PAGE TRANSITIONS */
        .page-view {
            animation: fadeIn 0.3s ease forwards;
            display: none;
        }

        .page-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* STANDARDIZED UI ELEMENTS */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid transparent;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: rgba(74, 222, 128, 0.15);
            color: var(--primary);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .btn-primary:hover {
            background: rgba(74, 222, 128, 0.25);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: var(--danger);
        }

        .btn-outline {
            background: transparent;
            border-color: var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: var(--bg-panel);
        }

        .mini-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 6px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-panel);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* KPIs */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 1.2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-dark);
        }

        .kpi-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .kpi-icon {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            opacity: 0.2;
            width: 28px;
            height: 28px;
        }

        /* LAYOUT GRIDS */
        .grid-2-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .grid-3-col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        .page-layout {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        /* WAREHOUSE GRID */
        .warehouse-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .shelf-block {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.2rem;
        }

        .shelf-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .box-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 1rem;
        }

        .shelf-box {
            aspect-ratio: 1.2;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shelf-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            pointer-events: none;
        }

        .shelf-box:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .box-id {
            font-weight: 800;
            font-size: 1rem;
            z-index: 1;
        }

        .box-pct {
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            align-self: flex-start;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        .bg-full, .bg-success { background: #166534; box-shadow: inset 0 0 10px rgba(74, 222, 128, 0.2); }
        .bg-low, .bg-warning { background: #b45309; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.2); }
        .bg-critical, .bg-danger { background: #991b1b; box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2); }
        .bg-empty { background: #450a0a; border: 1px dashed #ef4444; animation: flash 2s infinite; }

        .kpi-card.success { background: rgba(74, 222, 128, 0.05); border-color: rgba(74, 222, 128, 0.2); }
        .kpi-card.warning { background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.2); }
        .kpi-card.danger { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2); }
        .kpi-card.primary { background: rgba(56, 189, 248, 0.05); border-color: rgba(56, 189, 248, 0.2); }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* SIMULATION OVERLAYS */
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        .matrix-text {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glow-border {
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4) !important;
        }

        .glow-text-primary {
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
        }

        /* GRID ENHANCEMENTS */
        .box, .shelf-box {
            position: relative;
        }
        
        .box::after, .shelf-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(255,255,255,0.05), transparent);
            background-size: 100% 10px;
            animation: scanLine 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .aisle-connector {
            height: 20px;
            background: repeating-linear-gradient(90deg, var(--border), var(--border) 10px, transparent 10px, transparent 20px);
            margin: 0.5rem 0;
            opacity: 0.3;
        }

        /* DATA TABLES */
        .table-responsive {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th {
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            background: var(--bg-panel);
            white-space: nowrap;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* STATUS PILLS */
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* ROBOTICS PANEL */
        .robot-panel {
            position: relative;
        }

        .robot-glow {
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(74, 222, 128, 0.1);
            filter: blur(60px);
            pointer-events: none;
        }

        .robot-console-line {
            margin: 2px 0;
            border-left: 2px solid var(--primary);
            padding-left: 8px;
            animation: slideInX 0.2s;
            font-family: monospace;
        }

        .robot-console-alert {
            color: var(--danger);
            border-left-color: var(--danger);
        }

        @keyframes slideInX {
            from {
                transform: translateX(-10px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* DROPDOWNS & MODALS */
        .dropdown {
            position: absolute;
            top: 120%;
            right: 0;
            width: 320px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            padding: 1rem;
            display: none;
            z-index: 1001;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .dropdown.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Notifications Panel inner */
        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .notif-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .notif-item {
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .notif-item:hover {
            border-color: var(--primary);
        }

        .notif-item.read {
            opacity: 0.6;
        }

        .search-results-dropdown {
            left: 0;
            right: auto;
            width: 100%;
            top: calc(100% + 5px);
        }

        .search-result-item {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .search-result-item:hover {
            background: var(--bg-panel);
            color: var(--primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-panel);
            width: 90%;
            max-width: 600px;
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: zoomIn 0.2s;
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .modal-close:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* TOAST */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            background: var(--bg-panel);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            animation: slideInUp 0.3s forwards;
            max-width: 350px;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
            gap: 1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .tab-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .tab-item:hover {
            color: var(--text-main);
        }

        .tab-item.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* ─── ESP32 CONNECTION PANEL ─────────────────────── */
        .conn-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .conn-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .conn-title {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .conn-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            display: inline-block;
            margin-right: 6px;
            transition: background 0.4s;
        }
        .conn-status-dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse-dot 2s infinite; }
        .conn-status-dot.offline { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
        .conn-status-dot.testing { background: var(--warning); animation: pulse-dot 0.6s infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
        }
        .conn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 0.8rem;
            align-items: end;
        }
        @media (max-width: 900px) {
            .conn-grid { grid-template-columns: 1fr 1fr; }
        }
        .conn-type-btns {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }
        .conn-type-btn {
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .conn-type-btn.active {
            background: rgba(74,222,128,0.15);
            color: var(--primary);
            border-color: rgba(74,222,128,0.4);
        }
        .sensor-readout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .sensor-big-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .sensor-big-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(74,222,128,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .sensor-value-big {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            font-family: monospace;
            transition: color 0.4s;
        }
        .sensor-unit {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        .sensor-label-small {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.6rem;
        }
        .sensor-sub {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-family: monospace;
        }
        .conn-footer {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .conn-stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .conn-stat span { color: var(--text-main); font-weight: 600; }
        .blink { animation: blink-anim 1.2s infinite; }
        @keyframes blink-anim { 0%,100%{opacity:1} 50%{opacity:0.2} }
    </style>
</head>

<body>
    <!-- SIDEBAR NAVIGATION -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo">A.R.I.S.E<span>.</span></div>
        </div>

        <p class="nav-label">General Mode</p>
        <a class="nav-item active" data-path="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a class="nav-item" data-path="inventory"><i data-lucide="box"></i> Inventory Engine</a>
        <a class="nav-item" data-path="analytics"><i data-lucide="line-chart"></i> Analytics Hub</a>
        <a class="nav-item" data-path="robotics"><i data-lucide="cpu"></i> Robotics Control</a>

        <p class="nav-label">Management</p>
        <a class="nav-item" data-path="procurement"><i data-lucide="file-text"></i> Procurement</a>

        <div style="margin-top: auto;">
            <a class="nav-item" data-path="settings"><i data-lucide="settings"></i> Settings</a>
            <a class="nav-item" data-path="profile"><i data-lucide="user"></i> My Profile</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <!-- HEADER -->
        <header>
            <div class="header-content">
                <div class="breadcrumb">
                    <span id="bc-main">A.R.I.S.E</span> / <span id="bc-current" class="active">Dashboard</span>
                </div>

                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="global-search" placeholder="Search products, regions, skus...">
                    <i data-lucide="sliders-horizontal" class="search-filter-icon" title="Advanced Search"></i>
                    <div class="dropdown search-results-dropdown" id="search-dropdown"></div>
                </div>
            </div>

            <div class="header-actions">
                <div style="position: relative;">
                    <button class="icon-btn" id="notif-trigger">
                        <i data-lucide="bell"></i>
                        <span class="badge" id="notif-badge" style="display:none;">0</span>
                    </button>
                    <div class="dropdown" id="notif-panel">
                        <div class="notif-header">
                            <span>Notifications</span>
                            <div style="display:flex; gap: 0.5rem;">
                                <button class="btn btn-outline mini-btn" id="btn-mark-read">Mark Read</button>
                                <button class="btn btn-danger mini-btn" id="btn-clear-notif"><i data-lucide="trash-2"
                                        style="width:12px;height:12px;"></i> Clear</button>
                            </div>
                        </div>
                        <div class="notif-list" id="notif-list">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>

                <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
                    <i data-lucide="sun" id="theme-icon"></i>
                </button>

                <div class="profile-btn" data-path="profile">AD</div>
            </div>
        </header>

        <!-- SPA MAINFRAME -->
        <main id="app-content">
            <!-- Dynamic Content Injected Here -->
        </main>
    </div>

    <!-- GLOBAL MODALS -->
    <!-- Product Detail Modal Side Drawer replacement (but functioning as centered modal for now) -->


    <!-- Procurement PO Preview Modal -->
    <div class="modal-overlay" id="po-modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-close" onclick="document.getElementById('po-modal').classList.remove('active')"><i
                    data-lucide="x"></i></div>
            <h2
                style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom:1rem; font-size:1.2rem;">
                Review Procurement Order</h2>
            <div id="po-preview-content"
                style="background: var(--bg-body); padding: 1.5rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem; line-height: 1.5; white-space: pre-wrap; margin-bottom: 1.5rem; max-height: 50vh; overflow-y: auto; border: 1px solid var(--border);">
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn btn-outline"
                    onclick="document.getElementById('po-modal').classList.remove('active')">Cancel</button>
                <button class="btn btn-primary" id="po-download-btn"><i data-lucide="download"></i> Download
                    PDF</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content" style="max-width: 400px; text-align:center; padding: 2.5rem;">
            <i data-lucide="alert-triangle"
                style="width: 48px; height: 48px; color: var(--warning); margin: 0 auto 1.5rem auto;"></i>
            <h3 style="margin-bottom: 0.5rem;" id="confirm-title">Are you sure?</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem;" id="confirm-text">This action
                cannot be undone.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-outline"
                    onclick="document.getElementById('confirm-modal').classList.remove('active')">Cancel</button>
                <button class="btn btn-danger" id="confirm-action-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div id="toast-container"></div>

    <!-- APP LOGIC -->
    <script>
        // --- STATE MANAGEMENT ---
        const appState = {
            currentPage: "dashboard",
            inventory: [],
            logs: [],
            alerts: [],
            settings: { threshold: 20, role: 'Admin', leadTime: 3, growthFactor: 1.15, alertsEnabled: true },
            filters: { search: '', category: 'all', shelf: 'all', analyticsPeriod: '7d', analyticsProduct: 'all', stockLevel: 'all', view: 'grid', analyticsTab: 'trend', demandView: 'day', dashTrendPeriod: '7d', productTrendPeriod: '30d' },
            currentProduct: null,
            robot: {
                active: false,
                interval: null,
                currentTarget: null,
                scanIndex: 0,
                totalScans: 0,
                lastData: null
            }
        };

        const shelves = ['A', 'B', 'C'];
        const categories = ['Electronics', 'Grocery', 'Furniture', 'Industrial', 'Chemicals', 'Apparel', 'Automotive', 'Healthcare'];
        const suppliers = ['Global Logistics', 'Nexus Parts', 'EcoSupply Co', 'Titan Industries', 'AeroCorp', 'MediLink', 'Zenith Systems', 'A.R.I.S.E Direct'];
        let charts = {};

        // --- CORE UTILITIES ---
        function generateID() { return Math.random().toString(36).substr(2, 9); }
        function spawnToast(type, text) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const colors = { critical: 'var(--danger)', warning: 'var(--warning)', info: 'var(--primary)', success: 'var(--success)' };
            toast.style.borderLeftColor = colors[type] || colors.info;
            toast.innerHTML = `<p style="font-weight:700; font-size:0.75rem; color:${colors[type]}">${type.toUpperCase()}</p><p style="font-size:0.85rem;">${text}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        function logActivity(msg) {
            appState.logs.unshift({ msg, time: new Date().toLocaleTimeString() });
            if (appState.logs.length > 50) appState.logs.pop();
            console.log(`[ERP_LOG]: ${msg}`);
        }
        function hasAccess(level) {
            const roles = { 'Admin': 3, 'Manager': 2, 'Staff': 1 };
            return roles[appState.settings.role] >= roles[level];
        }

        // --- MOCK DATA ENGINE ---
        function initData() {
            let idCounter = 1620;
            appState.inventory = []; // flush
            shelves.forEach(aisle => {
                for (let shelf = 1; shelf <= 3; shelf++) {
                    for (let bin = 1; bin <= 7; bin++) {
                        const id = `${aisle}${shelf}-${bin}`;
                        const cap = 150 + Math.floor(Math.random() * 150);
                        // Ensure some sectors are empty (0) and some are very low (5) for better testing
                        const qtyPct = [0, 5, 20, 45, 80, 95][Math.floor(Math.random() * 6)];
                        const qty = Math.floor((qtyPct / 100) * cap);
                        let history = Array.from({ length: 7 }, () => Math.floor(Math.random() * 40));

                        appState.inventory.push({
                            id, sku: `SKU-${10000 + idCounter--}`, name: `${categories[Math.floor(Math.random() * categories.length)]} Unit`,
                            qty, cap, category: categories[Math.floor(Math.random() * categories.length)], history,
                            lastUpdated: new Date(Date.now() - Math.random() * 86400000).toLocaleString(),
                            supplier: suppliers[Math.floor(Math.random() * suppliers.length)], price: Math.floor(Math.random() * 100) + 10, rfid: 'RFID-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                            scanned: false, aisle: aisle, shelf: shelf, bin: bin
                        });
                    }
                }
            });

            // Initial Alerts
            processAlerts();
            logActivity("System Core Booted & Inventory Loaded");
        }

        function runPrediction(item) {
            const avg = item.history.reduce((a, b) => a + b, 0) / 7;
            const seasonal = avg * appState.settings.growthFactor;
            const stockOut = seasonal > 0 ? Math.floor(item.qty / seasonal) : 999;
            return { demand: seasonal.toFixed(1), stockOut, restockQty: Math.max(50, Math.ceil((seasonal * appState.settings.leadTime * 2) - item.qty)) };
        }

        // --- NOTIFICATIONS & ALERTS ---
        function processAlerts() {
            if (!appState.settings.alertsEnabled) return;

            // Check Low Stock
            appState.inventory.forEach(item => {
                const pct = (item.qty / item.cap) * 100;
                if (pct < appState.settings.threshold) {
                    const existing = appState.alerts.find(a => a.itemId === item.id && !a.resolved);
                    if (!existing) {
                        appState.alerts.unshift({ id: generateID(), itemId: item.id, type: pct === 0 ? 'critical' : 'warning', text: `${pct === 0 ? 'EMPTY' : 'LOW STOCK'}: Sector ${item.id}`, time: new Date().toLocaleTimeString(), resolved: false, read: false });
                    }
                }
            });
            updateNotifUI();
        }

        function updateNotifUI() {
            const list = document.getElementById('notif-list');
            const badge = document.getElementById('notif-badge');
            const activeAlerts = appState.alerts.filter(a => !a.resolved);
            const unreadCount = activeAlerts.filter(a => !a.read).length;

            if (unreadCount > 0) {
                badge.style.display = 'flex';
                badge.innerText = unreadCount;
            } else {
                badge.style.display = 'none';
            }

            if (activeAlerts.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 1.5rem;"><i data-lucide="check-circle" style="width:30px;height:30px"></i> All clear.</div>';
            } else {
                list.innerHTML = activeAlerts.map(a => `
                    <div class="notif-item ${a.read ? 'read' : ''}" data-id="${a.id}">
                        <div style="flex:1">
                            <p style="font-weight:600; color: var(--${a.type === 'critical' ? 'danger' : 'warning'});">${a.text}</p>
                            <p style="font-size:0.7rem; color:var(--text-muted); margin-top:2px;">${a.time}</p>
                        </div>
                        <button class="btn btn-outline mini-btn" onclick="resolveAlert('${a.id}')" style="padding:4px;"><i data-lucide="check" style="width:14px;height:14px"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function resolveAlert(id) {
            const a = appState.alerts.find(a => a.id === id);
            if (a) { a.resolved = true; a.read = true; updateNotifUI(); }
        }

        document.getElementById('btn-mark-read').addEventListener('click', () => {
            appState.alerts.forEach(a => a.read = true);
            updateNotifUI();
        });

        document.getElementById('btn-clear-notif').addEventListener('click', () => {
            document.getElementById('confirm-title').innerText = "Clear All Alerts?";
            document.getElementById('confirm-text').innerText = "This will permanently archive all current system notifications.";
            document.getElementById('confirm-modal').classList.add('active');

            document.getElementById('confirm-action-btn').onclick = () => {
                appState.alerts = appState.alerts.filter(a => a.resolved); // Keep resolved history, clear active
                appState.alerts.forEach(a => { a.resolved = true; a.read = true; }); // Mark everything resolved
                updateNotifUI();
                spawnToast('success', 'Alerts cleared.');
                document.getElementById('confirm-modal').classList.remove('active');
            };
        });

        // --- SPA ROUTING ---
        const pages = {
            dashboard: renderDashboard,
            inventory: renderInventory,
            analytics: renderAnalytics,
            robotics: renderRobotics,
            procurement: renderProcurement,
            profile: renderProfile,
            settings: renderSettings,
            product: renderProduct
        };

        function navigate(path, params = {}) {
            if (!pages[path]) path = "dashboard";
            appState.currentPage = path;

            if (params.stockLevel) appState.filters.stockLevel = params.stockLevel;
            else if (path === 'inventory' && !params.keepFilters) appState.filters.stockLevel = 'all';

            if (params.view) appState.filters.view = params.view;
            if (params.analyticsTab) appState.filters.analyticsTab = params.analyticsTab;

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.querySelector(`.nav-item[data-path="${path}"]`);
            if (activeNav) activeNav.classList.add('active');

            document.getElementById('bc-current').innerText = path.charAt(0).toUpperCase() + path.slice(1);

            // Re-render Main Content Container
            const main = document.getElementById('app-content');
            main.innerHTML = `<div class="empty-state"><i data-lucide="loader-2" class="blink"></i> Loading module...</div>`;
            lucide.createIcons();

            setTimeout(() => {
                const markup = pages[path]();
                main.innerHTML = `<div class="page-view active">${markup}</div>`;
                if (['dashboard', 'analytics', 'product'].includes(path)) initCharts(path);
                lucide.createIcons();
            }, 100);

            // Sync URL hash without jumping
            history.pushState(null, null, `#${path}`);
            logActivity(`Navigated to ${path}`);
        }

        // Add Listeners
        document.querySelectorAll('[data-path]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navigate(link.getAttribute('data-path'));
            });
        });

        window.addEventListener('popstate', () => {
            let hash = window.location.hash.replace('#', '');
            navigate(hash || 'dashboard');
        });

        // --- PAGE RENDER FUNCTIONS ---

        function renderDashboard() {
            const totQty = appState.inventory.reduce((a, b) => a + b.qty, 0);
            const lowCount = appState.inventory.filter(i => (i.qty / i.cap) * 100 < appState.settings.threshold && i.qty > 0).length;
            const empty = appState.inventory.filter(i => i.qty === 0).length;
            const avgDemand = (appState.inventory.reduce((a, b) => a + parseFloat(runPrediction(b).demand), 0) / appState.inventory.length);
            const alertsCount = appState.alerts.filter(a => !a.resolved).length;

            let dLabel = 'Day', dMult = 1;
            if (appState.filters.demandView === 'week') { dLabel = 'Week'; dMult = 7; }
            if (appState.filters.demandView === 'month') { dLabel = 'Month'; dMult = 30; }
            const demandValue = (avgDemand * dMult).toFixed(1);

            return `
                <!-- SIMULATION STATUS BAR -->
                <div class="card glow-border" style="margin-bottom:1.5rem; padding:0.8rem 1.5rem; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3);">
                    <div style="display:flex; gap:1.5rem; align-items:center;">
                        <span class="matrix-text" style="color:var(--primary); font-size:0.75rem;"><span class="blink">●</span> LIVE SYSTEM SIMULATION</span>
                        <span style="font-size:0.7rem; color:var(--text-muted); border-left:1px solid var(--border); padding-left:1.5rem;">LOG_STAMP: ${new Date().toISOString()}</span>
                    </div>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <div style="text-align:right;">
                            <p class="matrix-text" style="font-size:0.6rem; color:var(--text-muted); margin:0;">SYNC_NODE</p>
                            <p class="matrix-text" style="font-size:0.7rem; color:var(--primary); margin:0;">STABLE</p>
                        </div>
                    </div>
                </div>

                <div class="kpi-row">
                    <div class="kpi-card success glow-border" onclick="navigate('inventory', {view: 'table', keepFilters:false})" style="background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), transparent);">
                        <i data-lucide="boxes" class="kpi-icon" style="color: var(--primary)"></i>
                        <p class="kpi-label matrix-text">In_Stock_Total</p>
                        <div class="kpi-value glow-text-primary">${totQty.toLocaleString()}</div>
                        <div style="font-size:0.65rem; color:var(--text-muted); margin-top:0.4rem;">AVG_UTIL: ${Math.round((totQty / appState.inventory.reduce((a,b)=>a+b.cap,0))*100)}%</div>
                    </div>
                    <div class="kpi-card warning" onclick="navigate('inventory', {stockLevel: 'low', keepFilters:true})" style="background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), transparent);">
                        <i data-lucide="alert-circle" class="kpi-icon" style="color: var(--warning)"></i>
                        <p class="kpi-label matrix-text">Low_Threshold</p>
                        <div class="kpi-value" style="color: var(--warning)">${lowCount}</div>
                        <div style="font-size:0.65rem; color:var(--text-muted); margin-top:0.4rem;">ACTION_REQUIRED</div>
                    </div>
                    <div class="kpi-card danger" onclick="spawnToast('info', 'Filtering Null Sectors...'); navigate('inventory', {stockLevel: 'empty', keepFilters:true})" style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), transparent); cursor:pointer;">
                        <i data-lucide="layers" class="kpi-icon" style="color: var(--danger)"></i>
                        <p class="kpi-label matrix-text">Null_Sectors</p>
                        <div class="kpi-value" style="color: var(--danger)">${empty}</div>
                        <div style="font-size:0.65rem; color:var(--text-muted); margin-top:0.4rem;">
                            ${empty > 0 ? 'CO_ORDS: ' + appState.inventory.filter(i => i.qty === 0).slice(0, 2).map(i => i.id).join(', ') + (empty > 2 ? '...' : '') : 'ALL_SYSTEMS_NOMINAL'}
                        </div>
                    </div>
                    <div class="kpi-card danger glow-border" onclick="spawnToast('info', 'Opening Alerts...'); document.getElementById('notif-panel').classList.add('show');" style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), transparent); cursor:pointer; position:relative; z-index:100;">
                        <i data-lucide="activity" class="kpi-icon" style="color: var(--critical)"></i>
                        <p class="kpi-label matrix-text">System_Alerts</p>
                        <div class="kpi-value" style="color: var(--critical)">${alertsCount}</div>

        function renderInventory() {
            let list = appState.inventory;
            if (appState.filters.category !== 'all') list = list.filter(i => i.category === appState.filters.category);
            if (appState.filters.shelf !== 'all') list = list.filter(i => i.id.startsWith(appState.filters.shelf));
            if (appState.filters.stockLevel === 'low') list = list.filter(i => { const p = (i.qty / i.cap) * 100; return p > 0 && p < appState.settings.threshold; });
            if (appState.filters.stockLevel === 'empty') list = list.filter(i => i.qty === 0);

            const tableHtml = `
                <div class="table-responsive">
                    <table class="data-table">

                            ${list.map(i => {
                const pct = Math.round((i.qty / i.cap) * 100);
                let color = 'success';
                if (pct === 0) color = 'danger'; else if (pct < appState.settings.threshold) color = 'warning';
                return `
                                <tr data-inv-id="${i.id}">
                                    <td><strong>${i.id}</strong></td>
                                    <td><div style="font-family:monospace; color:var(--text-muted)">${i.sku}<br>${i.rfid}</div></td>
                                    <td>${i.name}</td>
                                    <td>${i.category}</td>
                                    <td>
                                        <div style="display:flex; align-items:center; gap:0.5rem">
                                            <div style="width: 60px; height: 6px; background: var(--bg-body); border-radius:3px; overflow:hidden;">
                                                <div class="inv-bar" style="width:${pct}%; background:var(--${color}); height:100%;"></div>
                                            </div>
                                            <span><strong class="inv-qty-cell">${i.qty}</strong><span style="color:var(--text-muted)">/${i.cap}</span></span>
                                        </div>
                                    </td>
                                    <td><button class="btn btn-outline mini-btn" onclick="openProductDetail('${i.id}')">Inspect</button></td>
                                </tr>`;
            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            return `
                <div class="page-layout">
                    <!-- Main Inventory View -->
                    <div>
                        <div class="tabs">
                            <div class="tab-item ${appState.filters.view === 'grid' ? 'active' : ''}" onclick="appState.filters.view='grid'; navigate('inventory', {view: 'grid', keepFilters:true})">Grid View Mapping</div>
                            <div class="tab-item ${appState.filters.view === 'table' ? 'active' : ''}" onclick="appState.filters.view='table'; navigate('inventory', {view: 'table', keepFilters:true})">Detailed Table View</div>
                        </div>
                        
                        <div class="warehouse-wrapper" style="display:${appState.filters.view === 'grid' ? 'block' : 'none'};">
                            ${list.length === 0 ? '<div class="empty-state">No matching sectors found.</div>' : renderGrid(list, true)}
                        </div>
                        <div class="table-wrapper" style="display:${appState.filters.view === 'table' ? 'block' : 'none'};">
                            ${list.length === 0 ? '<div class="empty-state">No matching sectors found.</div>' : tableHtml}
                        </div>
                    </div>
                    
                    <!-- Advanced Filters Panel -->
                    <div class="card">
                        <h3 style="font-size:1rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.8rem;">Filter Controls</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Stock Status</label>
                            <select class="form-control" onchange="appState.filters.stockLevel=this.value; navigate('inventory', {keepFilters:true})">
                                <option value="all" ${appState.filters.stockLevel === 'all' ? 'selected' : ''}>All Sectors</option>
                                <option value="low" ${appState.filters.stockLevel === 'low' ? 'selected' : ''}>Low Stock</option>
                                <option value="empty" ${appState.filters.stockLevel === 'empty' ? 'selected' : ''}>Empty Shelves</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-control" onchange="appState.filters.category=this.value; navigate('inventory', {keepFilters:true})">
                                <option value="all" ${appState.filters.category === 'all' ? 'selected' : ''}>All Categories</option>
                                <option value="Electronics" ${appState.filters.category === 'Electronics' ? 'selected' : ''}>Electronics</option>
                                <option value="Grocery" ${appState.filters.category === 'Grocery' ? 'selected' : ''}>Grocery</option>
                                <option value="Furniture" ${appState.filters.category === 'Furniture' ? 'selected' : ''}>Furniture</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Sector Region</label>
                            <select class="form-control" onchange="appState.filters.shelf=this.value; navigate('inventory', {keepFilters:true})">
                                <option value="all" ${appState.filters.shelf === 'all' ? 'selected' : ''}>All Regions</option>
                                <option value="A" ${appState.filters.shelf === 'A' ? 'selected' : ''}>Sector A</option>
                                <option value="B" ${appState.filters.shelf === 'B' ? 'selected' : ''}>Sector B</option>

                        </div>
                    </div>
                </div>

        function renderGrid(data, grouped = true) {
            let html = '';
            if (!grouped) {
                html += `
                <div class="card" style="padding:0; overflow:hidden;">
                    <table class="data-table" style="margin:0;">
                        <thead>
                            <tr class="matrix-text" style="font-size:0.7rem; color:var(--text-muted); background:rgba(0,0,0,0.2);">

                                <th>STATUS</th>

                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(i => {
                                const pct = (i.qty / i.cap) * 100;
                                let color = pct === 0 ? 'danger' : (pct < appState.settings.threshold ? 'warning' : 'success');
                                return `
                                <tr>
                                    <td class="matrix-text" style="font-weight:700;">${i.id}</td>
                                    <td><span class="status-pill status-${color}">${color.toUpperCase()}</span></td>
                                    <td>
                                        <div style="display:flex; align-items:center; gap:0.5rem;">
                                            <div style="flex:1; height:6px; background:var(--bg-body); border-radius:3px; overflow:hidden;">
                                                <div style="width:${pct}%; height:100%; background:var(--${color});"></div>
                                            </div>
                                            <span style="font-size:0.65rem;">${Math.round(pct)}%</span>
                                        </div>
                                    </td>
                                    <td style="font-size:0.75rem;">${i.category}</td>
                                    <td><button class="btn btn-outline mini-btn" onclick="openProductDetail('${i.id}')">LINK</button></td>
                                </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
            } else {
                ['A', 'B', 'C'].forEach((aisle, idx) => {
                    const aisleData = data.filter(i => i.aisle === aisle);
                    if (aisleData.length === 0) return;
                    
                    html += `
                    <div class="shelf-row glow-border" style="background:rgba(0,0,0,0.1); padding:1.2rem; border-radius:12px; margin-bottom:2rem;">
                        <div class="matrix-text" style="color:var(--primary); font-weight:700; margin-bottom:1.5rem; display:flex; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:0.5rem;">
                            <span><i data-lucide="layout-grid"></i> AISLE_ARRAY: ${aisle}</span>
                            <span style="font-size:0.6rem; color:var(--text-muted);">TABULATED_TOPOLOGY</span>
                        </div>
                        <table style="width:100%; border-collapse: separate; border-spacing: 6px;">
                            <thead>
                                <tr class="matrix-text" style="font-size:0.6rem; color:var(--text-muted);">
                                    <th style="text-align:left; width:80px; padding-bottom:8px;">SHELF_LVL</th>
                                    <th>BIN_01</th><th>BIN_02</th><th>BIN_03</th><th>BIN_04</th><th>BIN_05</th><th>BIN_06</th><th>BIN_07</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${[3, 2, 1].map(shelf => {
                                    const shelfData = aisleData.filter(i => i.shelf === shelf);
                                    return `
                                    <tr>
                                        <td class="matrix-text" style="font-size:0.65rem; background:rgba(0,0,0,0.2); text-align:center; padding:10px; border-radius:4px; border:1px solid var(--border);">LVL_${shelf}</td>
                                        ${[1,2,3,4,5,6,7].map(bin => {
                                            const item = shelfData.find(i => i.bin === bin);
                                            if (!item) return '<td></td>';
                                            const pct = Math.round((item.qty / item.cap) * 100);
                                            let color = pct === 0 ? 'danger' : (pct < appState.settings.threshold ? 'warning' : 'success');
                                            return `
                                            <td>
                                                <div class="box bg-${color}" onclick="openProductDetail('${item.id}')" 
                                                     style="height:36px; border-radius:4px; border:1px solid rgba(255,255,255,0.05); cursor:pointer; position:relative; box-shadow: 0 4px 8px rgba(0,0,0,0.4);"
                                                     onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 10px currentColor';"
                                                     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.4)';"
                                                     title="NODE_${item.id}: ${pct}% FILL">
                                                    <span style="position:absolute; bottom:2px; right:4px; font-size:8px; color:rgba(255,255,255,0.4); font-family:monospace; pointer-events:none;">${item.id}</span>
                                                </div>
                                            </td>`;
                                        }).join('')}
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>`;
                });
            }
            return html;
        }

        function generateBoxHtml(item) {
            const pct = (item.qty / item.cap) * 100;
            let color = 'bg-full';
            if (pct === 0) color = 'bg-empty';
            else if (pct < appState.settings.threshold) color = 'bg-critical';
            else if (pct < 70) color = 'bg-low';

            return `<div class="shelf-box ${color}" onclick="openProductDetail('${item.id}')">
                <div class="box-id">${item.id}</div>
                <div class="box-pct">${Math.round(pct)}% Full</div>
            </div>`;
        }

                                    ${[...appState.inventory].sort((a, b) => (b.qty / b.cap) - (a.qty / a.cap)).slice(0, 5).map(i => {
                const p = Math.round((i.qty / i.cap) * 100);
                return `<tr><td>${i.id}</td><td>${i.qty}</td><td><span style="color:var(--${p > 90 ? 'danger' : (p < appState.settings.threshold ? 'warning' : 'success')})">${p}%</span></td></tr>`;

                                </tbody>
                            </table>
                        </div>
                    </div>

            `;

                                <div id="robot-console" style="flex:1; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; font-size:0.8rem;">

                            <div style="display:flex; flex-direction:column; gap: 1.5rem; padding: 1.5rem 1rem; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border);">
                                ${['A', 'B', 'C'].map(aisle => `

        function adjustQty(id, d) {

            logActivity(`Manual intake (+${d}) logged for ${item.name}`);
