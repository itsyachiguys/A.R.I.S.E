            if (appState.currentPage === 'inventory') navigate('inventory'); // Fresh render
            openProductDetail(id); // refresh modal
            processAlerts();
        }

        // --- CHARTS INITIALIZATION ---
        function initCharts(page) {
            let labels = [], data = [];
            if (charts.trend) charts.trend.destroy();
            if (charts.dist) charts.dist.destroy();
            if (charts.cap) charts.cap.destroy();

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const tc = isDark ? '#94a3b8' : '#475569';
            const gc = isDark ? '#1d3326' : '#e2e8f0';

            if (page === 'dashboard') {
                const p = appState.filters.dashTrendPeriod || '7d';
                let days = 7;
                if (p === '30d') days = 30;
                if (p === '1y') days = 365;
                for (let i = days - 1; i >= 0; i--) { labels.push(i + 'd'); data.push(4000 + Math.floor(Math.random() * 800 + Math.sin(i / 5) * 500)); }

                const ctx = document.getElementById('dashTrendChart');
                if (ctx) {
                    const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
                    gradient.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
                    gradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

                    charts.trend = new Chart(ctx, { 
                        type: 'line', 
                        data: { labels, datasets: [{ data, borderColor: '#38bdf8', backgroundColor: gradient, fill: true, tension: 0.4, pointRadius: 0, borderWidth: 3 }] }, 
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            plugins: { legend: { display: false } }, 
                            scales: { y: { grid: { color: gc, drawBorder: false }, ticks: { color: tc, font: { family: 'JetBrains Mono' } } }, x: { grid: { display: false }, ticks: { color: tc, font: { family: 'JetBrains Mono' }, maxTicksLimit: 12 } } } 
                        } 
                    });
                }

                const ctxU = document.getElementById('dashUtilChart');
                if (ctxU) {
                    let utilData = Object.fromEntries(shelves.map(s => {
                        const items = appState.inventory.filter(i => i.id.startsWith(s));
                        return [s, Math.round((items.reduce((a, b) => a + b.qty, 0) / items.reduce((a, b) => a + b.cap, 0)) * 100)];
                    }));
                    charts.dist = new Chart(ctxU, { 
                        type: 'bar', 
                        data: { 
                            labels: Object.keys(utilData).map(k => 'SEC_' + k), 
                            datasets: [{ data: Object.values(utilData), backgroundColor: ['#4ade80', '#fbbf24', '#f87171'], borderRadius: 6 }] 
                        }, 
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            plugins: { legend: { display: false } }, 
                            scales: { y: { max: 100, grid: { color: gc, drawBorder: false }, ticks: { color: tc, font: { family: 'JetBrains Mono' } } }, x: { grid: { display: false }, ticks: { color: tc, font: { family: 'JetBrains Mono' } } } } 
                        } 
                    });
                }

                // NEW: Category Allocation
                const ctxC = document.getElementById('dashCatChart');
                if (ctxC) {
                    const catData = categories.map(cat => ({ 
                        label: cat, 
                        val: appState.inventory.filter(i => i.category === cat).reduce((a,b)=>a+b.qty,0) 
                    }));
                    new Chart(ctxC, {
                        type: 'doughnut',
                        data: {
                            labels: catData.map(c => c.label),
                            datasets: [{
                                data: catData.map(c => c.val),
                                backgroundColor: ['#818cf8', '#fb7185', '#34d399', '#f472b6', '#a78bfa', '#fbbf24', '#2dd4bf', '#94a3b8'],
                                borderWidth: 2,
                                borderColor: 'rgba(0,0,0,0.3)',
                                hoverOffset: 15
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'right', labels: { color: tc, boxWidth: 10, font: { family: 'JetBrains Mono', size: 9 } } } },
                            cutout: '65%'
                        }
                    });
                }

                // NEW: Supplier Performance
                const ctxS = document.getElementById('dashSupChart');
                if (ctxS) {
                    const supData = suppliers.map(s => {
                        const items = appState.inventory.filter(i => i.supplier === s);
                        return {
                            label: s,
                            nodes: items.length,
                            totalQty: items.reduce((a,b)=>a+b.qty,0)
                        };
                    });
                    new Chart(ctxS, {
                        type: 'bar',
                        data: {
                            labels: supData.map(s => s.label.length > 8 ? s.label.substring(0,8)+'..' : s.label),
                            datasets: [
                                { label: 'Node_Density', data: supData.map(s => s.nodes), backgroundColor: '#a78bfa', borderRadius: 4 },
                                { label: 'Asset_Volume', data: supData.map(s => s.totalQty / 100), backgroundColor: 'rgba(56, 189, 248, 0.4)', borderRadius: 4 }
                            ]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true, maintainAspectRatio: false,
                            plugins: { 
                                legend: { display: true, position: 'bottom', labels: { color: tc, font: { size: 9, family: 'JetBrains Mono' } } } 
                            },
                            scales: { 
                                x: { grid: { color: gc }, ticks: { color: tc, font: { size: 9, family: 'JetBrains Mono' } } },
                                y: { grid: { display: false }, ticks: { color: tc, font: { size: 9, family: 'JetBrains Mono' } } }
                            }
                        }
                    });
                }
            } else if (page === 'analytics') {
                if (appState.filters.analyticsTab === 'trend') {
                    const p = appState.filters.analyticsPeriod || '7d';
                    let days = 7;
                    if (p === '30d') days = 30;
                    if (p === '3m') days = 90;
                    if (p === '1y') days = 365;

                    let baseDataPoints = [];
                    let seedMulti = 1;
                    if (appState.filters.analyticsProduct && appState.filters.analyticsProduct !== 'all') {
                        const match = appState.inventory.find(i => i.id === appState.filters.analyticsProduct);
                        if (match) seedMulti = match.cap;
                    } else if (appState.filters.analyticsGroup && appState.filters.analyticsGroup !== 'all') {
                        seedMulti = 500;
                    } else {
                        seedMulti = 2000;
                    }

                    const today = new Date();
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date(today);
                        d.setDate(d.getDate() - i);
                        labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                        let val = Math.floor((seedMulti * 0.4) + Math.random() * (seedMulti * 0.3) + Math.sin(i / 10) * (seedMulti * 0.2));
                        data.push(Math.max(0, val));
                    }

                    const ctx = document.getElementById('an-trendChart');
                    if (ctx) {
                        const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
                        gradient.addColorStop(0, 'rgba(74, 222, 128, 0.4)');
                        gradient.addColorStop(1, 'rgba(74, 222, 128, 0)');

                        charts.trend = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels,
                                datasets: [{ label: 'Unit_Throughput', data, borderColor: '#4ade80', backgroundColor: gradient, fill: true, tension: 0.4, borderWidth: 3, pointRadius: days > 30 ? 0 : 3 }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { labels: { color: tc, font: { family: 'JetBrains Mono' } } } },
                                scales: {
                                    y: { grid: { color: gc, drawBorder: false }, ticks: { color: tc, font: { family: 'JetBrains Mono' } } },
                                    x: { grid: { display: false }, ticks: { color: tc, maxTicksLimit: 12, font: { family: 'JetBrains Mono' } } }
                                }
                            }
                        });
                    }
                } else {
                    const ctxC = document.getElementById('an-capChart');
                    if (ctxC) {
                        let capDataMax = Object.fromEntries(shelves.map(s => [s, appState.inventory.filter(i => i.id.startsWith(s)).reduce((a, b) => a + b.cap, 0)]));
                        let capDataCur = Object.fromEntries(shelves.map(s => [s, appState.inventory.filter(i => i.id.startsWith(s)).reduce((a, b) => a + b.qty, 0)]));
                        charts.cap = new Chart(ctxC, {
                            type: 'bar',
                            data: {
                                labels: Object.keys(capDataMax),
                                datasets: [
                                    { label: 'Active Inventory', data: Object.values(capDataCur), backgroundColor: '#4ade80', borderRadius: 4 },
                                    { label: 'Empty Capacity', data: Object.keys(capDataMax).map(s => capDataMax[s] - capDataCur[s]), backgroundColor: isDark ? '#1d3326' : '#e2e8f0', borderRadius: 4 }
                                ]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: tc } } }, scales: { x: { stacked: true, grid: { display: false }, ticks: { color: tc } }, y: { stacked: true, grid: { color: gc }, ticks: { color: tc } } } }
                        });
                    }
                }
            } else if (page === 'product') {
                const p = appState.filters.productTrendPeriod || '30d';
                let days = 30; if (p === '7d') days = 7; if (p === '1y') days = 365;
                const item = appState.inventory.find(i => i.id === appState.currentProduct) || { cap: 1000 };
                for (let i = days - 1; i >= 0; i--) { labels.push(i + 'd'); data.push(Math.max(0, Math.floor(item.cap * 0.4 + Math.random() * (item.cap * 0.3)))); }
                const ctx = document.getElementById('prodTrendChart');
                if (ctx) {
                    charts.trend = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Unit Drawdown', data, borderColor: 'var(--primary)', backgroundColor: 'rgba(74, 222, 128, 0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, elements: { point: { radius: days > 60 ? 0 : 4 } }, plugins: { legend: { labels: { color: tc } } }, scales: { y: { grid: { color: gc }, ticks: { color: tc } }, x: { grid: { display: false }, ticks: { color: tc, maxTicksLimit: 12 } } } } });
                }
            }
        }

        function toggleRobot() {
            if (appState.robot.active) stopSimulation();
            else startSimulation();
        }

        // ─── CORE SCAN CYCLE ─────────────────────────────────────────────
        async function runScanCycle() {
            if (appState.robot.scanIndex >= appState.inventory.length) {
                appState.robot.active = false;
                clearInterval(appState.robot.interval);
                spawnToast('success', `Full scan complete — ${appState.robot.totalScans} sectors verified.`);
                logToConsole('[SYS] ✓ Scan complete — all sectors verified.');
                if (appState.currentPage === 'robotics') navigate('robotics');
                return;
            }

            const item = appState.inventory[appState.robot.scanIndex];
            const sensorData = generateSimData(item);

            // ── Process good data ────────────────────────────────────────
            appState.robot.lastData = sensorData;
            appState.robot.totalScans++;
            appState.robot.scanIndex++;

            const dist = sensorData.dist;  // cm
            const gas  = sensorData.gas;   // raw ADC 0-4095 (ESP32) or 0-1023 (sim)
            const isEsp32 = appState.robot.connMode !== 'SIM';
            const gasMax = isEsp32 ? 4095 : 1023;

            // Map ultrasonic distance → stock quantity
            // Distance close (< 20cm) = shelf full; Distance far (> 120cm) = empty.
            const fillRatio = 1 - Math.min(1, Math.max(0, (dist - 20) / 100));
            const newQty = Math.round(item.cap * fillRatio);
            item.qty = newQty;
            item.scanned = true;
            item.lastUpdated = new Date().toLocaleString();

            const pct = Math.round((item.qty / item.cap) * 100);
            const stockColor = pct === 0 ? 'var(--danger)' : pct < appState.settings.threshold ? 'var(--warning)' : 'var(--success)';

            // ── Update Warehouse Map Cell ────────────────────────────────
            if (appState.robot.currentTarget) {
                const old = document.getElementById('rbt-map-' + appState.robot.currentTarget);
                if (old) {
                    const oi = appState.inventory.find(i => i.id === appState.robot.currentTarget);
                    let bg = 'var(--bg-panel)', op = '0.3';
                    if (oi && oi.scanned) {
                        const op2 = (oi.qty / oi.cap) * 100;
                        bg = `var(--${op2 < appState.settings.threshold ? (op2 === 0 ? 'danger' : 'warning') : 'success'})`;
                        op = '0.8';
                    }
                    old.style.background = bg; old.style.boxShadow = 'none';
                    old.style.transform = 'scale(1)'; old.style.opacity = op;
                }
            }
            appState.robot.currentTarget = item.id;
            const newCell = document.getElementById('rbt-map-' + item.id);
            if (newCell) {
                newCell.style.background = 'var(--primary)';
                newCell.style.boxShadow = '0 0 12px var(--primary)';
                newCell.style.transform = 'scale(1.3)';
                newCell.style.opacity = '1';
            }

            // ── Update Sensor Readout Cards ──────────────────────────────
            if (appState.currentPage === 'robotics') {
                // Distance card
                const sdEl = document.getElementById('sns-dist');
                if (sdEl) sdEl.innerHTML = `${dist}<span class="sensor-unit"> cm</span>`;
                const slEl = document.getElementById('sns-loc');
                if (slEl) slEl.textContent = `Target: Sector ${item.id} — ${item.name}`;
                const distBar = document.getElementById('dist-bar');
                if (distBar) {
                    const distPct = Math.min(100, (dist / 200) * 100);
                    distBar.style.width = distPct + '%';
                    distBar.style.background = dist < 30 ? 'var(--success)' : dist < 100 ? 'var(--warning)' : 'var(--danger)';
                }

                // Gas card
                const gasPct = Math.min(100, (gas / 1023) * 100);
                const gasV = (gas * (3.3 / 1023)).toFixed(2);
                const gasAlert = gas > 250;
                const smEl = document.getElementById('sns-mq');
                if (smEl) { smEl.textContent = gas; smEl.style.color = gasAlert ? 'var(--danger)' : ''; }
                const smvEl = document.getElementById('sns-mq-v');
                if (smvEl) smvEl.textContent = `${gasV} V — ${gasAlert ? '⚠ GAS ALERT' : 'SAFE'}`;
                const gasBar = document.getElementById('gas-bar');
                if (gasBar) {
                    gasBar.style.width = gasPct + '%';
                    gasBar.style.background = gasAlert ? 'var(--danger)' : gasPct > 15 ? 'var(--warning)' : 'var(--success)';
                }

                // Stock derived card
                const sdrvEl = document.getElementById('stock-derived');
                if (sdrvEl) sdrvEl.textContent = newQty;
                const scapEl = document.getElementById('stock-cap');
                if (scapEl) scapEl.textContent = `/ ${item.cap} units`;
                const stockBar = document.getElementById('stock-bar');
                if (stockBar) { stockBar.style.width = pct + '%'; stockBar.style.background = stockColor; }

                // Console log
                logToConsole(`[SCAN #${appState.robot.totalScans}] ${item.id} → Dist: ${dist}cm → Fill: ${pct}% → Gas: ${gas}`);
                if (gasAlert) {
                    logToConsole(`[⚠ ALERT] Gas spike at Sector ${item.id}! ADC=${gas}`, 'alert');
                    spawnToast('critical', `Gas spike at Sector ${item.id}!`);
                }

                // Sync inventory table row if open
                const invRow = document.querySelector(`[data-inv-id="${item.id}"]`);
                if (invRow) {
                    const qc = invRow.querySelector('.inv-qty-cell');
                    const bar = invRow.querySelector('.inv-bar');
                    if (qc) qc.innerText = newQty;
                    if (bar) { bar.style.width = pct + '%'; bar.style.background = stockColor; }
                }
            }

            processAlerts();
        }



        // ─── SIMULATION DATA GENERATOR ────────────────────────────────────────
        function generateSimData(item) {
            // Simulate realistic sensor readings
            const pct = (item.qty / item.cap);
            // Reverse-map: fuller shelf → closer distance
            const baseDist = 20 + (1 - pct) * 130 + (Math.random() - 0.5) * 8;
            const dist = parseFloat(Math.max(5, baseDist).toFixed(1));
            // Simulate occasional gas spike (5% chance)
            const gasSpike = Math.random() < 0.05;
            const gas = gasSpike
                ? 800 + Math.floor(Math.random() * 200)
                : Math.floor(50 + Math.random() * 100);
            const voltage = parseFloat((gas * (3.3 / 1023)).toFixed(2));
            return { dist, gas, voltage, status: gasSpike ? 'GAS_ALERT' : 'OK' };
        }


        function logToConsole(msg, type = 'info') {
            const el = document.getElementById('robot-console');
            if (!el) return;
            const line = document.createElement('div');
            line.className = 'robot-console-line';
            if (type === 'alert') line.classList.add('robot-console-alert');
            line.innerText = msg;
            el.appendChild(line);
            if (el.children.length > 8) el.removeChild(el.firstChild);
        }

        // --- PROCUREMENT (JSPDF) ---

        function generatePOData(items) {
            const num = "PO-" + Date.now();
            let total = 0;
            const fmt = items.map(i => {
                const q = i.p?.restockQty || 50; const p = i.price || 25; total += q * p;
                return { name: i.name, sku: i.sku, q, p, t: q * p };
            });
            return { num, date: new Date().toLocaleDateString(), sup: items.length === 1 ? items[0].supplier : "Central A.R.I.S.E Req", items: fmt, sub: total, tax: total * 0.1, tot: total * 1.1 };
        }
        function buildPOText(d) {
            let t = `[OFFICIAL REQUISITION: ${d.num}]\n\n`;
            t += `ISSUED: ${d.date}\nVENDOR: ${d.sup}\n`;
            t += `-------------------------------------------------\n`;
            d.items.forEach(i => t += `${i.sku.padEnd(10)} | ${i.name.padEnd(15)} | x${i.q} | ₹${i.t.toFixed(2)}\n`);
            t += `-------------------------------------------------\n`;
            t += `GRAND TOTAL: ₹${d.tot.toFixed(2)}`;
            return t;
        }
        function reviewPO(id) {
            const item = appState.inventory.find(i => i.id === id);
            const d = generatePOData([item]);
            document.getElementById('po-preview-content').innerText = buildPOText(d);
            document.getElementById('po-download-btn').onclick = () => { downloadPO(id); document.getElementById('po-modal').classList.remove('active'); };
            document.getElementById('po-modal').classList.add('active');
        }
        function reviewCombinedPO() {
            const list = appState.inventory.map(i => ({ ...i, p: runPrediction(i) })).filter(i => i.qty < i.p.demand * appState.settings.leadTime);
            if (list.length === 0) return spawnToast('warning', 'No automated targets found.');
            const d = generatePOData(list);
            document.getElementById('po-preview-content').innerText = buildPOText(d);
            document.getElementById('po-download-btn').onclick = () => { downloadCombinedPO(); document.getElementById('po-modal').classList.remove('active'); };
            document.getElementById('po-modal').classList.add('active');
        }

            const d = generatePOData([item]);
            renderProfessionalPDF(d, `${d.num}.pdf`);
        }

            const list = appState.inventory.map(i => ({ ...i, p: runPrediction(i) })).filter(i => i.qty < i.p.demand * appState.settings.leadTime);
